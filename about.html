<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About - Cursor App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 48px 56px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
      text-align: center;
      max-width: 480px;
    }

    h1 {
      color: #2575fc;
      font-size: 2.2rem;
      margin-bottom: 12px;
    }

    p {
      color: #555;
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .badge {
      display: inline-block;
      margin-top: 20px;
      padding: 6px 16px;
      background: #eef2ff;
      color: #2575fc;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .back-link {
      display: inline-block;
      margin-top: 24px;
      color: #2575fc;
      text-decoration: none;
      font-weight: 600;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>About This Project</h1>
    <p>Cursor App is a simple static site built to demonstrate a basic multi-page HTML setup.</p>
    <span class="badge">Built with Cursor</span>
    <br />
    <a class="back-link" href="index.html">&larr; Back to Home</a>
  </div>
</body>
</html>
